name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [ main ]

  # Umożliwia ręczne uruchomienie workflow z zakładki "Actions"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pozwala na jednoczesne wykonywanie tylko jednego deploymentu
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Zgodnie z Twoim środowiskiem lokalnym
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
        env:
          # Nadpisuje opcjonalnie zmienne, jeśli potrzebne
          NODE_VERSION: 22

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Wskazuje na katalog wyjściowy Astro

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
